name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Scope analysis to the app's own source. The vendored `packages/jni/`
      # copy emits unrelated path warnings that would otherwise fail the gate.
      - name: Analyze
        run: flutter analyze lib test

      - name: Test
        run: flutter test

  build-android:
    name: Build Android APK (debug)
    runs-on: ubuntu-latest
    needs: analyze-and-test
    # Allow the job to create GitHub Releases via GITHUB_TOKEN.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # google-services.json is gitignored, so it must be supplied via a secret.
      # Store it base64-encoded: `base64 -w0 android/app/google-services.json`.
      - name: Inject Firebase config (google-services.json)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::Secret GOOGLE_SERVICES_JSON is not set. Add it (base64 of android/app/google-services.json) to build the Android app."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      # Publish a fresh GitHub Release with the APK on every push to main.
      # PR runs and manual dispatch are skipped so they don't create releases.
      - name: Publish GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          body: |
            Automated debug build from commit ${{ github.sha }}.
          files: build/app/outputs/flutter-apk/app-release.apk
